<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Style Menu</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial Black', Gadget, sans-serif;
            background: radial-gradient(circle, #2c1054 0%, #0f051d 100%);
        }

        /* Холст для 3D графики */
        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Слой 2D Интерфейса (UI) */
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Чтобы мышка пролетала сквозь UI к 3D объекту */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        /* Все элементы интерфейса должны снова реагировать на клики */
        .ui-element {
            pointer-events: auto;
        }

        /* Верхняя панель */
        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        .profile-box {
            background: rgba(0, 0, 0, 0.6);
            border: 3px solid #fff;
            border-radius: 10px;
            padding: 10px 20px;
            color: #fff;
            text-shadow: 2px 2px #000;
        }

        .currency-box {
            display: flex;
            gap: 15px;
        }

        .currency {
            background: #ffcc00;
            color: #000;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            border: 2px solid #fff;
            box-shadow: 0 4px #cca300;
        }

        /* Боковые кнопки */
        .side-menu {
            position: absolute;
            right: 20px;
            top: 35%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-side {
            background: #00bfff;
            color: white;
            border: 3px solid #fff;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            text-shadow: 2px 2px #000;
            box-shadow: 0 5px #0086b3;
            transition: 0.1s;
        }

        .btn-side:active {
            transform: translateY(3px);
            box-shadow: 0 2px #0086b3;
        }

        /* Нижняя панель и кнопка ИГРАТЬ */
        .bottom-bar {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-bottom: 20px;
        }

        .btn-play {
            background: linear-gradient(to bottom, #ffcc00, #ff9900);
            color: #fff;
            font-size: 28px;
            padding: 15px 60px;
            border: 4px solid #fff;
            border-radius: 20px;
            cursor: pointer;
            text-shadow: 3px 3px #000;
            box-shadow: 0 8px #b36b00, 0 10px 15px rgba(0,0,0,0.5);
            letter-spacing: 2px;
            transition: 0.1s;
        }

        .btn-play:hover {
            filter: brightness(1.1);
        }

        .btn-play:active {
            transform: translateY(4px);
            box-shadow: 0 4px #b36b00;
        }

        /* Подсказка снизу */
        .hint {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div id="ui-container">
        <div class="top-bar">
            <div class="profile-box ui-element">
                <div>PLAYER_1</div>
                <div style="color: #ffcc00; font-size: 14px;">🏆 12,500</div>
            </div>
            <div class="currency-box ui-element">
                <div class="currency">🪙 4,250</div>
                <div class="currency" style="background: #00ff66; box-shadow: 0 4px #00b347;">💎 89</div>
            </div>
        </div>

        <div class="side-menu ui-element">
            <button class="btn-side">МАГАЗИН</button>
            <button class="btn-side" style="background: #ff3366; box-shadow: 0 5px #b3002d;">БОЙЦЫ</button>
            <button class="btn-side">КЛУБ</button>
        </div>

        <div class="bottom-bar">
            <button class="btn-play ui-element">ИГРАТЬ</button>
        </div>
    </div>

    <div class="hint">Покрути мышкою, чтобы повернуть персонажа</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Основные переменные
        let scene, camera, renderer, controls, mixer, clock;

        init();
        animate();

        function init() {
            const canvas = document.getElementById('webgl-canvas');
            clock = new THREE.Clock();

            // 2. Создание сцены
            scene = new THREE.Scene();
            
            // Добавляем туман, как в бравле, для красивого ухода заднего плана в темноту
            scene.fog = new THREE.FogExp2(0x1a0933, 0.08);

            // 3. Камера
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.5, 4.5); // Камера чуть выше уровня глаз и смотрит на центр

            // 4. Рендерер (настройка графики)
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true; // Включаем тени
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping; // Делает цвета более сочными

            // 5. Освещение
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); // Общий мягкий свет
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.8); // Яркое "солнце" сверху-справа
            dirLight.position.set(5, 8, 5);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.bias = -0.001;
            scene.add(dirLight);

            // Подсветка сзади/снизу (синеватая), чтобы контуры персонажа выделялись
            const sideLight = new THREE.DirectionalLight(0x00aaff, 1.0);
            sideLight.position.set(-5, 2, -3);
            scene.add(sideLight);

            // 6. Подиум под персонажем
            const stageGeo = new THREE.CylinderGeometry(1.2, 1.3, 0.15, 32);
            const stageMat = new THREE.MeshStandardMaterial({ 
                color: 0x3a1d6e, 
                roughness: 0.4,
                metalness: 0.2 
            });
            const stage = new THREE.Mesh(stageGeo, stageMat);
            stage.position.y = -1.07; // Опускаем подиум под ноги
            stage.receiveShadow = true;
            scene.add(stage);

            // 7. Управление мышкой (Ограничиваем, чтобы не крутить камеру как попало)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // Плавная остановка вращения
            controls.dampingFactor = 0.05;
            controls.enableZoom = false;   // Запрещаем приближать
            controls.enablePan = false;    // Запрещаем двигать сцену влево/вправо
            controls.minPolarAngle = Math.PI / 2.5; // Ограничение по вертикали (не смотрим строго сверху)
            controls.maxPolarAngle = Math.PI / 1.8; // Не падаем под пол

            // 8. Загрузка модельки попугая parrot.glb
            const loader = new GLTFLoader();
            loader.load(
                'parrot.glb', // Путь к твоему файлу
                (gltf) => {
                    const model = gltf.scene;
                    
                    // Центрируем модельку над нашим подиумом
                    model.position.set(0, -1, 0); 
                    
                    // Масштаб (если попугай окажется слишком большим или маленьким, измени эти три цифры)
                    model.scale.set(1, 1, 1); 

                    // Включаем тени для всех частей модели
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });

                    scene.add(model);

                    // Включаем анимацию покоя (Idle), если она зашита в модель
                    if (gltf.animations && gltf.animations.length > 0) {
                        mixer = new THREE.AnimationMixer(model);
                        // Запускаем самую первую анимацию из списка файлов
                        const action = mixer.clipAction(gltf.animations[0]);
                        action.play();
                    }
                },
                // Функция в процессе загрузки (можно сделать шкалу загрузки)
                (xhr) => { console.log((xhr.loaded / xhr.total * 100) + '% loaded'); },
                // Ошибка загрузки
                (error) => { console.error('Ошибка при загрузке попугая:', error); }
            );

            // Обработка изменения размеров окна (Ресайз)
            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 9. Игровой цикл анимации (Рендерится ~60 кадров в секунду)
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            
            // Обновляем анимацию костей попугая
            if (mixer) mixer.update(delta);

            // Обновляем физику вращения мыши
            controls.update();

            // Рисуем кадр
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
