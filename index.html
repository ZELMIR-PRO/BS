<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brawl Stars Style Menu - Beach Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-touch-callout: none;
            font-family: 'Arial Black', Gadget, sans-serif;
            letter-spacing: -0.5px;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Адаптивный фон - Пляж */
        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('https://cdn.pixabay.com/photo/2017/01/20/00/30/maldives-1993704_1280.jpg');
            background-size: cover;
            background-position: center bottom;
            z-index: 1;
        }

        /* 2D Управление */
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2.5vw;
        }

        .ui-element { pointer-events: auto; }

        /* Стиль кнопок: Голубой с переливом (блеском) */
        .bs-btn {
            background: linear-gradient(135deg, #4ed9ff 0%, #1579ff 50%, #4ed9ff 100%);
            background-size: 200% 200%;
            animation: shine 2s linear infinite;
            color: #fff;
            border: 0.3vw solid #000;
            border-radius: 12px;
            cursor: pointer;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.8);
            box-shadow: 0 5px #0056cc, 0 8px 10px rgba(0,0,0,0.3);
            transition: transform 0.05s, box-shadow 0.05s;
            text-align: center;
        }

        .bs-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px #0056cc;
        }

        /* Анимация блеска */
        @keyframes shine {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        /* Верхняя панель */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .profile-box {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #fff;
            border-radius: 8px;
            padding: 0.5vw 1.5vw;
            color: #fff;
            font-size: 1.8vw;
            text-shadow: 1px 1px #000;
        }

        .trophies { color: #ffcc00; font-size: 1.4vw; }

        .currency-box { display: flex; gap: 1vw; }

        .currency {
            font-size: 1.6vw;
            padding: 0.4vw 1.2vw;
            border-radius: 10px;
            border: 2px solid #fff;
            box-shadow: 0 3px rgba(0,0,0,0.3);
            text-shadow: 1px 1px #000;
        }

        .gold { background-color: #ffcc00; color: #000; box-shadow: 0 3px #cca300; }
        .gems { background-color: #00ff66; color: #fff; box-shadow: 0 3px #00cc52; }

        /* Боковые меню (появляются в ландшафте) */
        .side-menu {
            display: none;
            position: absolute;
            flex-direction: column;
            gap: 1.2vw;
            top: 25%;
        }

        .side-menu.left { left: 2vw; }
        .side-menu.right { right: 2vw; }

        .btn-side {
            width: 10vw;
            font-size: 1.2vw;
            padding: 1.2vw 0;
            border-radius: 10px;
        }

        /* Нижняя кнопка ИГРАТЬ */
        .bottom-bar {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-bottom: 2vw;
            z-index: 12;
        }

        .btn-play {
            width: 30vw;
            font-size: 3.5vw;
            padding: 1.5vw 0;
            border-radius: 18px;
        }

        /* МОБИЛЬНАЯ ОПТИМИЗАЦИЯ - Ландшафтный режим */
        @media screen and (orientation: landscape) {
            #ui-container { padding: 1.5vw 2.5vw; }
            .top-bar { font-size: 1vw; }
            .profile-box { font-size: 1.2vw; }
            .trophies { font-size: 1vw; }
            .currency { font-size: 1.2vw; }
            
            .side-menu { display: flex; } /* Показываем боковые меню */
            
            .bottom-bar { padding-bottom: 1vw; }
            .btn-play { width: 22vw; font-size: 2.2vw; border-radius: 15px; }
        }

        /* Скрытие бокового меню в портретном режиме */
        @media screen and (orientation: portrait) {
            .side-menu { display: none; }
        }

        /* Подсказка для мобильных (скрыта в ландшафте) */
        .mobile-hint {
            position: absolute;
            bottom: 10vh;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 3vw;
            font-weight: normal;
            pointer-events: none;
            display: block;
        }
        @media screen and (orientation: landscape) {
            .mobile-hint { display: none; }
        }
    </style>
</head>
<body>

    <!-- 3D Холст (Прозрачный, поверх фона) -->
    <canvas id="webgl-canvas"></canvas>

    <!-- 2D Интерфейс -->
    <div id="ui-container">
        
        <!-- Верхняя панель -->
        <div class="top-bar ui-element">
            <div class="profile-box">
                <div>ZELMIR-PRO</div>
                <div class="trophies">🏆 12,500</div>
            </div>
            <div class="currency-box">
                <div class="currency gold">🪙 4,250</div>
                <div class="currency gems">💎 89</div>
            </div>
        </div>

        <!-- Левое меню (Бравл Старс Ландшафт) -->
        <div class="side-menu left ui-element">
            <button class="bs-btn btn-side">МАГАЗИН</button>
            <button class="bs-btn btn-side">БОЙЦЫ</button>
        </div>

        <!-- Правое меню (Бравл Старс Ландшафт) -->
        <div class="side-menu right ui-element">
            <button class="bs-btn btn-side">КЛУБ</button>
            <button class="bs-btn btn-side">НАСТРОЙКИ</button>
        </div>

        <!-- Нижняя кнопка -->
        <div class="bottom-bar ui-element">
            <button class="bs-btn btn-play">ИГРАТЬ</button>
        </div>
    </div>

    <div class="mobile-hint">Покрути пальцем для вращения</div>

    <!-- Библиотеки -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, mixer, clock, model;

        init();
        animate();

        function init() {
            const canvas = document.getElementById('webgl-canvas');
            clock = new THREE.Clock();

            // Сцена (Прозрачная, чтобы видеть HTML фон)
            scene = new THREE.Scene();

            // Камера
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            updateCameraPosition(); // Устанавливаем начальную позицию

            // Рендерер (Альфа-канал для прозрачности)
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2; // Ярче общее освещение

            // Освещение (ГОРАЗДО ЯРЧЕ ДЛЯ БЕРЕГА)
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.2); // Сильный заполняющий
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 2.5); // Яркое солнце
            dirLight.position.set(5, 10, 7.5);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            scene.add(dirLight);

            const hemisphereLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8); // Доп. свет снизу
            scene.add(hemisphereLight);

            // Управление (Для мыши и тача)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.enableZoom = false;
            controls.enablePan = false;
            controls.minPolarAngle = Math.PI / 2.4;
            controls.maxPolarAngle = Math.PI / 2.0;

            // Загрузка parrot.glb
            const loader = new GLTFLoader();
            loader.load(
                'parrot.glb',
                (gltf) => {
                    model = gltf.scene;
                    model.position.set(0, -1.3, 0); 
                    model.scale.set(1, 1, 1); 

                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            // Настройка материалов для большей яркости и четкости
                            if (child.material) {
                                child.material.roughness = 0.6;
                                child.material.metalness = 0.1;
                                child.material.envMapIntensity = 1.0; 
                            }
                        }
                    });

                    scene.add(model);

                    if (gltf.animations && gltf.animations.length > 0) {
                        mixer = new THREE.AnimationMixer(model);
                        const action = mixer.clipAction(gltf.animations[0]);
                        action.play();
                    }
                },
                undefined,
                (error) => { console.error('Ошибка:', error); }
            );

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('orientationchange', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateCameraPosition(); // Пересчитываем положение камеры
        }

        // Адаптивное положение камеры для телефона
        function updateCameraPosition() {
            if (window.innerWidth < window.innerHeight) {
                // Портретный (вертикальный) - модель выше и дальше
                camera.position.set(0, 1.8, 5.5);
            } else {
                // Ландшафтный (горизонтальный) - как в Бравл Старс
                camera.position.set(0, 1.2, 4.0);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
